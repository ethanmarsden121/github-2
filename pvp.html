<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNG PvP Battle Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7a22e6 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 100, 255, 0.8);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(255, 100, 255, 0.8);
            }
            50% {
                text-shadow: 0 0 40px rgba(255, 100, 255, 1);
            }
        }

        .mode-selection {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .mode-selection h2 {
            font-size: 2em;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 15px 30px;
            margin: 10px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .mode-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.8);
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .player-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 2px solid;
            transition: transform 0.3s;
        }

        .player1 {
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .player2 {
            border-color: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        .player-name {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .player1 .player-name {
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .player2 .player-name {
            color: #ff0000;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
        }

        .health-bar {
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
            border: 2px solid #333;
        }

        .player1 .health-fill {
            background: linear-gradient(90deg, #00ffff, #00aa88);
            transition: width 0.5s ease;
            height: 100%;
        }

        .player2 .health-fill {
            background: linear-gradient(90deg, #ff0000, #ff6600);
            transition: width 0.5s ease;
            height: 100%;
        }

        .health-text {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .stats {
            font-size: 0.95em;
            line-height: 1.8;
        }

        .vs-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .turn-info {
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        #turnDisplay {
            font-size: 1.8em;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            margin-bottom: 20px;
        }

        #messageBox {
            font-size: 1.1em;
            color: #fff;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .action-btn {
            padding: 12px 25px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.5);
            font-weight: bold;
        }

        .action-btn:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
        }

        .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(102, 126, 234, 0.8);
        }

        .game-over-content h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
        }

        .restart-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            background: #ffd700;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255, 215, 0, 1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ RNG PvP Battle Arena ⚔️</h1>

        <!-- Game Mode Selection -->
        <div id="modeSelection" class="mode-selection">
            <h2>Select Game Mode</h2>
            <button class="mode-btn" onclick="startSinglePlayer()">🤖 VS Computer</button>
            <button class="mode-btn" onclick="startMultiplayer()">👥 Local Multiplayer</button>
        </div>

        <!-- Main Game Area -->
        <div id="gameArea" class="game-area" style="display: none;">
            <!-- Player 1 -->
            <div class="player-section player1">
                <div class="player-name" id="p1Name">Player 1</div>
                <div class="health-bar">
                    <div class="health-fill" id="p1Health" style="width: 100%"></div>
                </div>
                <div class="health-text" id="p1HealthText">100 / 100</div>
                <div class="stats">
                    <p>Last Roll: <span id="p1LastRoll">-</span></p>
                    <p>Damage: <span id="p1Damage">0</span></p>
                </div>
            </div>

            <!-- VS -->
            <div class="vs-area">
                <div class="turn-info">
                    <div id="turnDisplay">Player 1's Turn</div>
                    <div id="messageBox"></div>
                </div>
            </div>

            <!-- Player 2 -->
            <div class="player-section player2">
                <div class="player-name" id="p2Name">Player 2</div>
                <div class="health-bar">
                    <div class="health-fill" id="p2Health" style="width: 100%"></div>
                </div>
                <div class="health-text" id="p2HealthText">100 / 100</div>
                <div class="stats">
                    <p>Last Roll: <span id="p2LastRoll">-</span></p>
                    <p>Damage: <span id="p2Damage">0</span></p>
                </div>
            </div>
        </div>

        <!-- Control Panel -->
        <div id="controlPanel" class="control-panel" style="display: none;">
            <button class="action-btn" onclick="rollDice()">🎲 Roll Dice (1-20)</button>
            <button class="action-btn" onclick="useSpecialAttack()">⚡ Special Attack (1-30)</button>
            <button class="action-btn" onclick="defend()">🛡️ Defend</button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="game-over-screen" style="display: none;">
            <div class="game-over-content">
                <h2 id="winnerText"></h2>
                <p id="finalStats"></p>
                <button class="restart-btn" onclick="restartGame()">🔄 Play Again</button>
            </div>
        </div>
    </div>

    <script>
        let gameState = {
            mode: null,
            currentPlayer: 1,
            player1: {
                name: 'Player 1',
                health: 100,
                maxHealth: 100,
                defending: false,
                lastRoll: 0,
                lastDamage: 0
            },
            player2: {
                name: 'Player 2',
                health: 100,
                maxHealth: 100,
                defending: false,
                lastRoll: 0,
                lastDamage: 0
            },
            gameOver: false
        };

        function startSinglePlayer() {
            gameState.mode = 'single';
            gameState.player2.name = '🤖 Computer';
            document.getElementById('p2Name').textContent = gameState.player2.name;
            startGame();
        }

        function startMultiplayer() {
            gameState.mode = 'multi';
            const name = prompt('Enter Player 2 name:') || 'Player 2';
            gameState.player2.name = name;
            document.getElementById('p2Name').textContent = gameState.player2.name;
            startGame();
        }

        function startGame() {
            document.getElementById('modeSelection').style.display = 'none';
            document.getElementById('gameArea').style.display = 'grid';
            document.getElementById('controlPanel').style.display = 'flex';
            document.getElementById('p1Name').textContent = gameState.player1.name;
            updateUI();
        }

        function rollDice() {
            if (gameState.gameOver) return;

            const player = gameState.currentPlayer === 1 ? gameState.player1 : gameState.player2;
            const opponent = gameState.currentPlayer === 1 ? gameState.player2 : gameState.player1;

            const roll = Math.floor(Math.random() * 20) + 1;
            player.lastRoll = roll;

            let damage = roll;
            if (opponent.defending) {
                damage = Math.max(0, damage - 5);
                opponent.defending = false;
                showMessage(`${getPlayerName(gameState.currentPlayer)} rolled ${roll}! Defense reduced damage!`);
            } else {
                showMessage(`${getPlayerName(gameState.currentPlayer)} rolled ${roll}! Dealing ${damage} damage!`);
            }

            player.lastDamage = damage;
            opponent.health -= damage;
            opponent.health = Math.max(0, opponent.health);

            checkGameOver();
            if (!gameState.gameOver) {
                switchTurn();
            }
        }

        function useSpecialAttack() {
            if (gameState.gameOver) return;

            const player = gameState.currentPlayer === 1 ? gameState.player1 : gameState.player2;
            const opponent = gameState.currentPlayer === 1 ? gameState.player2 : gameState.player1;

            const roll = Math.floor(Math.random() * 30) + 1;
            player.lastRoll = roll;

            let damage = roll;
            if (opponent.defending) {
                damage = Math.max(0, damage - 8);
                opponent.defending = false;
                showMessage(`⚡ ${getPlayerName(gameState.currentPlayer)} used Special Attack! Rolled ${roll}. Defense blocked most of it!`);
            } else {
                showMessage(`⚡ ${getPlayerName(gameState.currentPlayer)} used Special Attack! Rolled ${roll}! Massive ${damage} damage!`);
            }

            player.lastDamage = damage;
            opponent.health -= damage;
            opponent.health = Math.max(0, opponent.health);

            checkGameOver();
            if (!gameState.gameOver) {
                switchTurn();
            }
        }

        function defend() {
            if (gameState.gameOver) return;

            const player = gameState.currentPlayer === 1 ? gameState.player1 : gameState.player2;
            player.defending = true;
            player.lastRoll = 0;
            player.lastDamage = 0;

            showMessage(`🛡️ ${getPlayerName(gameState.currentPlayer)} is defending! Next damage will be reduced.`);
            switchTurn();
        }

        function switchTurn() {
            if (gameState.mode === 'single' && gameState.currentPlayer === 1) {
                gameState.currentPlayer = 2;
                updateUI();
                setTimeout(computerTurn, 1500);
            } else if (gameState.mode === 'single' && gameState.currentPlayer === 2) {
                gameState.currentPlayer = 1;
                updateUI();
            } else {
                gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
                updateUI();
            }
        }

        function computerTurn() {
            if (gameState.gameOver) return;

            const actions = ['attack', 'special', 'defend', 'defend'];
            const randomAction = actions[Math.floor(Math.random() * actions.length)];

            if (randomAction === 'attack') {
                rollDice();
            } else if (randomAction === 'special') {
                useSpecialAttack();
            } else {
                defend();
            }
        }

        function checkGameOver() {
            if (gameState.player1.health <= 0) {
                endGame(gameState.player2.name);
            } else if (gameState.player2.health <= 0) {
                endGame(gameState.player1.name);
            }
        }

        function endGame(winner) {
            gameState.gameOver = true;
            document.getElementById('controlPanel').style.display = 'none';

            const winnerText = `🎉 ${winner} WINS! 🎉`;
            const finalStats = `
                ${gameState.player1.name}: ${gameState.player1.health} HP remaining<br>
                ${gameState.player2.name}: ${gameState.player2.health} HP remaining
            `;

            document.getElementById('winnerText').textContent = winnerText;
            document.getElementById('finalStats').innerHTML = finalStats;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function updateUI() {
            const p1HealthPercent = (gameState.player1.health / gameState.player1.maxHealth) * 100;
            document.getElementById('p1Health').style.width = p1HealthPercent + '%';
            document.getElementById('p1HealthText').textContent = `${gameState.player1.health} / ${gameState.player1.maxHealth}`;
            document.getElementById('p1LastRoll').textContent = gameState.player1.lastRoll || '-';
            document.getElementById('p1Damage').textContent = gameState.player1.lastDamage || '0';

            const p2HealthPercent = (gameState.player2.health / gameState.player2.maxHealth) * 100;
            document.getElementById('p2Health').style.width = p2HealthPercent + '%';
            document.getElementById('p2HealthText').textContent = `${gameState.player2.health} / ${gameState.player2.maxHealth}`;
            document.getElementById('p2LastRoll').textContent = gameState.player2.lastRoll || '-';
            document.getElementById('p2Damage').textContent = gameState.player2.lastDamage || '0';

            const currentName = getPlayerName(gameState.currentPlayer);
            document.getElementById('turnDisplay').textContent = `${currentName}'s Turn`;
        }

        function showMessage(message) {
            document.getElementById('messageBox').textContent = message;
            updateUI();
        }

        function getPlayerName(playerNum) {
            return playerNum === 1 ? gameState.player1.name : gameState.player2.name;
        }

        function restartGame() {
            gameState = {
                mode: null,
                currentPlayer: 1,
                player1: {
                    name: 'Player 1',
                    health: 100,
                    maxHealth: 100,
                    defending: false,
                    lastRoll: 0,
                    lastDamage: 0
                },
                player2: {
                    name: 'Player 2',
                    health: 100,
                    maxHealth: 100,
                    defending: false,
                    lastRoll: 0,
                    lastDamage: 0
                },
                gameOver: false
            };

            document.getElementById('modeSelection').style.display = 'block';
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('controlPanel').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('messageBox').textContent = '';
        }

        console.log('🎮 RNG PvP Game loaded! Choose your battle mode.');
    </script>
</body>
</html>
